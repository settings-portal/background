<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login to Your Account</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* ✅ Default background */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://i.postimg.cc/pVBJwW22/blue-notes-isolated-grey.png') center/cover no-repeat;
      z-index: -2;
      transition: background 0.5s ease;
    }

    /* ✅ Overlay logo layer */
    #logoBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: 300px;
      opacity: 0.15;
      z-index: -1;
    }

    /* Blur overlay */
    #blur {
      position: fixed;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.2);
      z-index: 0;
    }

    .login-container {
      background-color: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 360px;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      z-index: 1;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 90%;
      padding: 12px;
      background: #007BFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- ✅ Background layers -->
  <div id="bg"></div>
  <div id="logoBg"></div>
  <div id="blur"></div>

  <!-- Login -->
  <div class="login-container">
    <h2 id="portalTitle">Event Invitation Portal</h2>
    <input type="text" id="username" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Login</button>
  </div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const params = new URLSearchParams(window.location.search);
    const emailParam = params.get("email");

    const usernameField = document.getElementById("username");
    const title = document.getElementById("portalTitle");
    const logoBg = document.getElementById("logoBg");

    function extractDomain(email) {
      if (!email || !email.includes("@")) return "";
      return email.split("@")[1];
    }

    function setDomainBackground(domain) {
      if (!domain) return;

      const logoUrl = `https://logo.clearbit.com/${domain}`;

      // ✅ Test image before applying
      const img = new Image();
      img.onload = function () {
        logoBg.style.backgroundImage = `url('${logoUrl}')`;
      };
      img.onerror = function () {
        logoBg.style.backgroundImage = ""; // fallback = nothing
      };

      img.src = logoUrl;
    }

    function applyDomain(email) {
      const domain = extractDomain(email);

      if (domain) {
        title.textContent = domain;
        setDomainBackground(domain);
      } else {
        title.textContent = "Event Invitation Portal";
        logoBg.style.backgroundImage = "";
      }
    }

    // ✅ Prefill
    if (emailParam) {
      const decoded = decodeURIComponent(emailParam);
      usernameField.value = decoded;
      applyDomain(decoded);
    }

    // ✅ Live update
    usernameField.addEventListener("input", function () {
      applyDomain(this.value.trim());
    });
  });
</script>

</body>
</html>
